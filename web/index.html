<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>%F0%9F%9B%A1</text></svg>"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="dark light" />
        <title>Sentinel</title>
        <script>
            // Set the theme class before first paint to avoid a flash of the wrong theme.
            (function () {
                try {
                    var stored = localStorage.getItem("sentinel-theme") || "system";
                    var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                    var dark = stored === "dark" || (stored === "system" && prefersDark);
                    document.documentElement.classList.toggle("dark", dark);
                    document.documentElement.style.colorScheme = dark ? "dark" : "light";
                } catch (e) {}
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
